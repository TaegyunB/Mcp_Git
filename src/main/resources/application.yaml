spring:
  application:
    name: github-commits-mcp
  # HTTP(Streamable) 로 동작하는 원격 접속용 MCP 서버이므로 웹 서버를 켠다.
  main:
    web-application-type: servlet
    banner-mode: off
  ai:
    mcp:
      server:
        name: github-commits-mcp-server
        version: 0.0.1
        # STDIO 를 끄고 HTTP transport 사용
        stdio: false
        # 전송 프로토콜: STREAMABLE (Streamable HTTP). Claude Desktop 커스텀 커넥터가 붙는 방식.
        protocol: STREAMABLE
        # Streamable HTTP 엔드포인트 경로 (커넥터 URL 의 뒷부분)
        streamable-http:
          mcp-endpoint: /mcp
        instructions: >-
          GitHub 오늘 커밋을 조회하는 MCP 서버.
          get_todays_commits 도구로 오늘(한국시간) 올린 커밋 목록과
          각 커밋의 변경 파일 목록을 가져온다.
        capabilities:
          tool: true
          resource: true
          prompt: true

# HTTP 서버가 listen 할 포트
server:
  port: 8080

# HTTP transport 에서는 stdout 을 통신 채널로 쓰지 않으므로 콘솔 로그를 켜서 접속 상황을 본다.
logging:
  file:
    name: ./logs/github-commits-mcp-server.log
