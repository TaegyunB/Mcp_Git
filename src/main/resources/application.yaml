spring:
  application:
    name: github-commits-mcp
  # STDIO 로 동작하는 로컬 MCP 서버이므로 웹 서버와 배너를 끈다.
  main:
    web-application-type: none
    banner-mode: off
  ai:
    mcp:
      server:
        name: github-commits-mcp-server
        version: 0.0.1
        # STDIO transport 활성화 (Host <-> Client <-> Server 를 표준 입출력으로 연결)
        stdio: true
        instructions: >-
          GitHub 오늘 커밋을 조회하는 MCP 서버.
          get_todays_commits 도구로 오늘(한국시간) 올린 커밋 목록과
          각 커밋의 변경 파일 목록을 가져온다.
        capabilities:
          tool: true
          resource: true
          prompt: true

# STDIO transport 는 stdout 을 JSON-RPC 채널로 사용하므로,
# 로그가 stdout 을 오염시키지 않도록 콘솔 출력을 끄고 파일로만 남긴다.
logging:
  threshold:
    console: "OFF"
  file:
    name: ./logs/github-commits-mcp-server.log
